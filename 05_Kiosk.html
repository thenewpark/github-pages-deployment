.scan-chamber__frame::before, .scan-chamber__frame::after, .scan-chamber__frame .corner-br, .scan-chamber__frame .corner-bl { content:""; position:absolute; width:28px; height:28px; border-color:var(--col-rule-hi); border-style:solid; }

.scan-chamber__frame .corner-br { bottom:0;right:0;border-width:0 1px 1px 0; }
.scan-chamber__frame .corner-bl { bottom:0;left:0;border-width:0 0 1px 1px; }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:var(--sp-2); border:var(--border-med); cursor:pointer; transition:background 0.2s,border-color 0.2s,color 0.2s,transform 0.15s; user-select:none; position:relative; overflow:hidden; border-radius:var(--r-sm); font-family:'DM Sans','Outfit',sans-serif; }

.stagger-children > *:nth-child(1) { animation-delay:0.05s; }
.stagger-children > *:nth-child(2) { animation-delay:0.12s; }

/* 3D Fridge door animation */
.fridge-wrapper { position:relative; width:200px; height:280px; }
.fridge-body { position:relative; width:100%; height:260px; background:#E8E8E8; border-radius:12px 12px 4px 4px; overflow:visible; transform-style:preserve-3d; box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08); }
.fridge-inside { position:absolute; inset:8px; background:#1a1a1a; border-radius:6px; overflow:hidden; z-index:0; }
.fridge-shelf { position:absolute; left:8px; right:8px; height:2px; background:rgba(255,255,255,0.15); }
.fridge-glow { position:absolute; top:10%; left:20%; width:60%; height:30%; background:radial-gradient(ellipse,rgba(206,255,94,0.25),transparent 70%); animation:fridge-inner-glow 2s ease-in-out infinite alternate; }
.fridge-door { position:absolute; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg,#F5F5F5 0%,#E0E0E0 50%,#D8D8D8 100%); border-radius:12px 12px 4px 4px; transform-origin:left center; animation:fridge-door-open 2s cubic-bezier(0.16,1,0.3,1) 0.3s forwards; z-index:2; box-shadow:2px 0 12px rgba(0,0,0,0.1); }
.fridge-handle { position:absolute; right:16px; top:50%; transform:translateY(-50%); width:6px; height:50px; background:#C0C0C0; border-radius:3px; box-shadow:1px 0 3px rgba(0,0,0,0.1); }
.fridge-base { width:calc(100% + 8px); height:16px; margin-left:-4px; background:#D0D0D0; border-radius:0 0 6px 6px; box-shadow:0 2px 6px rgba(0,0,0,0.08); }

@keyframes fridge-door-open {
  0% { transform:perspective(800px) rotateY(0deg); }
  100% { transform:perspective(800px) rotateY(-70deg); }
}
@keyframes fridge-inner-glow {
  0% { opacity:0; }
  100% { opacity:1; }
}

   Used on Step 02 (Place Item). Reuses .fridge-door / .fridge-handle etc. classes. */
.scanner-wrap { width:260px; height:187px; }
.scanner-wrap .fridge-body { height:173px; }
.scanner-box.fridge-body { background:#0E0E0E; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06); overflow:hidden; border-radius:12px; }
.scanner-box .fridge-inside { background:#000000; }
.scanner-box .fridge-door {

.scanner-box .fridge-handle {

@keyframes scanner-door-slide-up {

.compost-bin { position:relative; width:180px; height:210px; display:flex; flex-direction:column; align-items:center; z-index:1; }
.compost-bin__lid {

/* Pill stepper - full width, high contrast */
.stepper { display:flex; align-items:center; gap:5px; width:100%; }
.stepper-pill { flex:1; height:44px; border-radius:100px; display:flex; align-items:center; justify-content:center; gap:5px; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:#999; background:#EBEBEB; border:none; transition:all 0.3s; white-space:nowrap; padding:0 10px; cursor:default; min-width:0; overflow:hidden; }

.pkg-wrapper { position:relative; width:320px; height:220px; }

/* Card drops down onto the lid, pauses, lifts back up — loops */
@keyframes card-drop-loop {
  0%    { transform:translate(-50%, -260px); }   /* high above package */
  30%   { transform:translate(-50%, -220px); }   /* hold high */
  55%   { transform:translate(-50%, -125px); }   /* resting on top of lid flange */
  75%   { transform:translate(-50%, -125px); }   /* hold */
  100%  { transform:translate(-50%, -260px); }   /* lift back */
}

@keyframes arrow-pulse {
  0%,25%   { opacity:0; transform:translate(-50%, 0); }
  40%      { opacity:1; transform:translate(-50%, 0); }
  50%      { opacity:1; transform:translate(-50%, 8px); }
  60%,100% { opacity:0; transform:translate(-50%, 0); }
}

function generateOrganicMesh(cx,cy,br,c,s){const p=[];const ri=18;const se=28;function rng(n){return(((Math.sin(n*s*127.1+s*311.7)*43758.5453)%1)+1)/2;}for(let r=0;r<=ri;r++){const phi=(r/ri)*Math.PI;const rR=Math.sin(phi);const rH=Math.cos(phi);const rP=[];for(let ss=0;ss<=se;ss++){const th=(ss/se)*Math.PI*2;const nA=rng(r*0.3+ss*0.17)*2-1;const nB=rng(r*0.7+ss*0.41+1)*2-1;const nC=rng(r*1.1+ss*0.29+2)*2-1;const d=1+nA*0.18*c+nB*0.1*c+nC*0.06*c;rP.push({x:br*rR*d,y:br*rH,z:br*rR*d,theta:th,phi});}p.push(rP);}return{points:p,rings:ri,segments:se};}
function generateBananaMesh(br,s){const p=[];const ri=18;const se=32;function rng(n){return(((Math.sin(n*s*91.7+s*217.3)*19731.123)%1)+1)/2;}for(let r=0;r<=ri;r++){const u=r/ri;const t=u*2-1;const cX=t*1.15;const cY=-0.58*(t*t)+0.18;const th=(0.22+0.22*(1-Math.abs(t)))*br;const rP=[];for(let ss=0;ss<=se;ss++){const theta=(ss/se)*Math.PI*2;const oY=Math.cos(theta)*th*0.82;const oZ=Math.sin(theta)*th*1.12;const n=(rng(r*0.47+ss*0.21)-0.5)*0.05;rP.push({x:cX*br+n,y:cY*br+oY+n*0.6,z:oZ+n*0.8,theta});}p.push(rP);}return{points:p,rings:ri,segments:se};}
function generateCanMesh(br,s){const p=[];const ri=16;const se=30;const bR=br*0.66;const hH=br*0.95;function rng(n){return(((Math.sin(n*s*77.1+s*44.9)*9988.77)%1)+1)/2;}for(let r=0;r<=ri;r++){const u=r/ri;const y=hH-u*2*hH;const eB=Math.min(1,Math.max(0,(Math.abs(y)-hH*0.62)/(hH*0.38)));const cB=eB*0.07;const rR=bR*(1-cB);const rP=[];for(let ss=0;ss<=se;ss++){const theta=(ss/se)*Math.PI*2;const sm=Math.sin(theta*3)*0.01+(rng(r*0.2+ss*0.6)-0.5)*0.01;rP.push({x:Math.cos(theta)*(rR+sm),y,z:Math.sin(theta)*(rR+sm),theta});}p.push(rP);}return{points:p,rings:ri,segments:se};}
function generateBreadMesh(br,s){const p=[];const ri=18;const se=30;function rng(n){return(((Math.sin(n*s*63.7+s*13.1)*28973.21)%1)+1)/2;}for(let r=0;r<=ri;r++){const u=r/ri;const y=(0.5-u)*1.7*br;const pr=Math.sin(u*Math.PI);const w=(0.52+pr*0.46)*br;const d=(0.44+pr*0.3)*br;const tD=Math.max(0,1-Math.pow((u-0.35)/0.45,2))*0.16;const rP=[];for(let ss=0;ss<=se;ss++){const theta=(ss/se)*Math.PI*2;const nx=Math.cos(theta);const nz=Math.sin(theta);const n=(rng(r*0.31+ss*0.23)-0.5)*0.045;rP.push({x:nx*w+n,y:y+tD*br+n*0.4,z:nz*d+n*0.6,theta});}p.push(rP);}return{points:p,rings:ri,segments:se};}
function generatePreparedMesh(br,s){const p=[];const ri=18;const se=30;function rng(n){return(((Math.sin(n*s*109.3+s*7.7)*15551.88)%1)+1)/2;}for(let r=0;r<=ri;r++){const u=r/ri;const phi=u*Math.PI;const y=Math.cos(phi)*br*0.78;const bRing=Math.sin(phi)*br*0.84;const sq=1-Math.abs(y)*0.18;const rP=[];for(let ss=0;ss<=se;ss++){const theta=(ss/se)*Math.PI*2;const lb=1+0.15*Math.sin(theta*3+u*4.2);const cl=1+(rng(r*0.52+ss*0.31)-0.5)*0.22;const rad=bRing*lb*cl*sq;rP.push({x:Math.cos(theta)*rad,y:y+(rng(r*0.1+ss*0.7)-0.5)*0.06,z:Math.sin(theta)*rad*0.92,theta});}p.push(rP);}return{points:p,rings:ri,segments:se};}

function centerMesh(m){const{points:p,rings:ri,segments:se}=m;let x1=Infinity,x2=-Infinity,y1=Infinity,y2=-Infinity,z1=Infinity,z2=-Infinity;for(let r=0;r<=ri;r++)for(let s=0;s<=se;s++){const pt=p[r][s];if(pt.x<x1)x1=pt.x;if(pt.x>x2)x2=pt.x;if(pt.y<y1)y1=pt.y;if(pt.y>y2)y2=pt.y;if(pt.z<z1)z1=pt.z;if(pt.z>z2)z2=pt.z;}const cx=(x1+x2)*0.5,cy=(y1+y2)*0.5,cz=(z1+z2)*0.5;for(let r=0;r<=ri;r++)for(let s=0;s<=se;s++){p[r][s].x-=cx;p[r][s].y-=cy;p[r][s].z-=cz;}return m;}
function generateMeshForFoodType(ft,seed){let m;switch(ft){case"produce":m=generateBananaMesh(1,seed);break;case"packaged":m=generateCanMesh(1,seed);break;case"bakery":m=generateBreadMesh(1,seed);break;case"prepared":m=generatePreparedMesh(1,seed);break;default:m=generateOrganicMesh(0,0,1,0.7,seed);break;}return centerMesh(m);}
function project3D(x,y,z,rY,rX,cx,cy,sc){const cY=Math.cos(rY),sY=Math.sin(rY);const x1=x*cY-z*sY,z1=x*sY+z*cY;const cX=Math.cos(rX),sX=Math.sin(rX);const y1=y*cX-z1*sX,z2=y*sX+z1*cX;const f=800;const d=f/(f+z2*0.5);return{sx:cx+x1*sc*d,sy:cy-y1*sc*d,depth:z2,scale:d};}

function meshGridColor(row,col,tR,tC,stage,alpha){
  if(stage==="idle"||stage==="welcome"||stage==="place"){const t=row/tR;return`rgba(${Math.round(80+t*58)},${Math.round(140+t*44)},${Math.round(20+t*12)},${alpha})`;}
  if(stage==="scanning"){const t=(row/tR+col/tC)*0.5;const r=Math.round(139-t*80);const g=Math.round(111+t*80);const b=Math.round(255-t*40);return`rgba(${r},${g},${b},${alpha})`;}
  if(stage==="result-accept")return`rgba(52,199,89,${alpha})`;
  if(stage==="result-decline")return`rgba(255,59,48,${alpha})`;
  if(stage==="result-review")return`rgba(255,149,0,${alpha})`;
  return`rgba(138,184,32,${alpha})`;
}

class MeshRenderer{constructor(canvas,foodType="produce"){this.canvas=canvas;this.ctx=canvas.getContext("2d");this.foodType=foodType;this.rotY=0;this.rotX=0.25;this.rotSpeed=0.003;this.stage="idle";this.scanLine=0;this.scanDir=1;this.scanActive=false;this.animFrame=null;this.mesh=null;this.targetRotX=0.25;this.seed=({produce:2.718,packaged:3.141,prepared:1.618,bakery:1.414})[foodType]||2.0;this.mesh=generateMeshForFoodType(this.foodType,this.seed);this._start();}
setFoodType(t){this.foodType=t;this.seed=({produce:2.718,packaged:3.141,prepared:1.618,bakery:1.414})[t]||2.0;this.mesh=generateMeshForFoodType(t,this.seed);}
setStage(s){this.stage=s;if(s==="scanning"){this.scanLine=0;this.scanDir=1;this.scanActive=true;this.rotSpeed=0.006;}else if(s==="idle"||s==="welcome"||s==="place"){this.scanActive=false;this.rotSpeed=0.003;}else if(s.startsWith("result")){this.scanActive=false;this.rotSpeed=0.001;this.targetRotX=0.15;}}
_start(){const draw=()=>{this.rotY+=this.rotSpeed;this.rotX+=(this.targetRotX-this.rotX)*0.02;if(this.scanActive){this.scanLine+=this.scanDir*0.004;if(this.scanLine>=1)this.scanDir=-1;if(this.scanLine<=0)this.scanDir=1;}this._render();this.animFrame=requestAnimationFrame(draw);};draw();}
stop(){if(this.animFrame)cancelAnimationFrame(this.animFrame);}
_render(){const c=this.canvas,ctx=this.ctx,W=c.width,H=c.height;ctx.clearRect(0,0,W,H);const cx=W*0.5,cy=H*0.5,bs=Math.min(W,H)*0.35;const{points:p,rings:ri,segments:se}=this.mesh;
for(let r=0;r<ri;r++){const n=r/ri;const op=0.2+Math.sin(n*Math.PI)*0.6;if(op<0.005)continue;ctx.beginPath();let f=true;for(let s=0;s<=se;s++){const pt=p[r][s];const{sx,sy}=project3D(pt.x,pt.y,pt.z,this.rotY,this.rotX,cx,cy,bs);if(f){ctx.moveTo(sx,sy);f=false;}else ctx.lineTo(sx,sy);}let a=op*0.55;if(this.scanActive){const rn=r/ri;const sd=Math.abs(rn-this.scanLine);if(sd<0.06)a=op*(1+((0.06-sd)/0.06)*2.5);}ctx.strokeStyle=meshGridColor(r,0,ri,se,this.stage,Math.min(a,1));ctx.lineWidth=0.5;ctx.stroke();}
for(let s=0;s<se;s+=2){ctx.beginPath();let f=true;for(let r=0;r<=ri;r++){const pt=p[r][s];const{sx,sy}=project3D(pt.x,pt.y,pt.z,this.rotY,this.rotX,cx,cy,bs);if(f){ctx.moveTo(sx,sy);f=false;}else ctx.lineTo(sx,sy);}ctx.strokeStyle=meshGridColor(0,s,ri,se,this.stage,0.21);ctx.lineWidth=0.4;ctx.stroke();}
const eq=Math.floor(ri*0.5);ctx.beginPath();let f=true;for(let s=0;s<=se;s++){const pt=p[eq][s];const{sx,sy}=project3D(pt.x,pt.y,pt.z,this.rotY,this.rotX,cx,cy,bs);if(f){ctx.moveTo(sx,sy);f=false;}else ctx.lineTo(sx,sy);}ctx.strokeStyle=meshGridColor(eq,0,ri,se,this.stage,0.9);ctx.lineWidth=1;ctx.stroke();
if(this.scanActive){const sT=16,sB=H-16,sY=sT+this.scanLine*(sB-sT),sL=10,sR=W-10;const g=ctx.createLinearGradient(sL,0,sR,0);g.addColorStop(0,"transparent");g.addColorStop(0.2,"rgba(138,184,32,0.0)");g.addColorStop(0.5,"rgba(138,184,32,0.8)");g.addColorStop(0.8,"rgba(138,184,32,0.0)");g.addColorStop(1,"transparent");ctx.strokeStyle=g;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sL,sY);ctx.lineTo(sR,sY);ctx.stroke();}
// ticks
const tc=8;ctx.strokeStyle="rgba(0,0,0,0.06)";ctx.lineWidth=0.5;for(let i=0;i<=tc;i++){const x=cx-bs+(i/tc)*bs*2;const th=i%4===0?8:4;ctx.beginPath();ctx.moveTo(x,cy-bs-12);ctx.lineTo(x,cy-bs-12-th);ctx.stroke();ctx.beginPath();ctx.moveTo(x,cy+bs+12);ctx.lineTo(x,cy+bs+12+th);ctx.stroke();}for(let i=0;i<=tc;i++){const y=cy-bs+(i/tc)*bs*2;const tw=i%4===0?8:4;ctx.beginPath();ctx.moveTo(cx-bs-12,y);ctx.lineTo(cx-bs-12-tw,y);ctx.stroke();}}}

class AmbientRenderer{constructor(canvas){this.canvas=canvas;this.ctx=canvas.getContext("2d");this.particles=Array.from({length:40},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.12,vy:(Math.random()-0.5)*0.08,size:Math.random()*1.2+0.3,alpha:Math.random()*0.15+0.03,hue:Math.floor(Math.random()*30)+80}));this.animFrame=null;this._start();}
_start(){const draw=()=>{const ctx=this.ctx,W=this.canvas.width,H=this.canvas.height;ctx.clearRect(0,0,W,H);this.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=`hsla(${p.hue},50%,55%,${p.alpha})`;ctx.fill();});this.animFrame=requestAnimationFrame(draw);};draw();}
stop(){if(this.animFrame)cancelAnimationFrame(this.animFrame);}}

const STEP_DURATIONS = [900, 1100, 800, 700, 600, 1000];
const TOTAL_DURATION = STEP_DURATIONS.reduce((a, b) => a + b, 0);
let _scanTimers = [];

let _scanAudioCtx = null;
let _scanAudioInterval = null;
function startScanSound() {
  try {
    if (!_scanAudioCtx) {
      _scanAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (_scanAudioCtx.state === "suspended") {
      _scanAudioCtx.resume();
    }
    stopScanSound();
    _scanAudioInterval = setInterval(() => {
      const now = _scanAudioCtx.currentTime;
      const osc = _scanAudioCtx.createOscillator();
      const gain = _scanAudioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(1450, now);
      osc.frequency.exponentialRampToValueAtTime(950, now + 0.08);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.025, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.11);
      osc.connect(gain).connect(_scanAudioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.12);
    }, 260);
  } catch (e) {}
}
function stopScanSound() {
  if (_scanAudioInterval) {
    clearInterval(_scanAudioInterval);
    _scanAudioInterval = null;
  }
}
function startScanSequence(onStepChange, onComplete) {
  cancelScan();
  startScanSound();
  const did = generateDonationId();
  beginScan(did);
  let elapsed = 0;
  const st = Date.now();
  let pt = setInterval(() => {
    setScanProgress(Math.min(((Date.now() - st) / TOTAL_DURATION) * 100, 100));
  }, 50);
  _scanTimers.push(pt);
  SCAN_STEPS.forEach((step, i) => {
    const t = setTimeout(() => {
      advanceScanStep(i);
      if (onStepChange) onStepChange(i, step);
    }, elapsed);
    _scanTimers.push(t);
    elapsed += STEP_DURATIONS[i];
  });
  const ct = setTimeout(() => {
    clearInterval(pt);
    setScanProgress(100);
    const sc = getSelectedScenario();
    const v = SCENARIOS[sc] || SCENARIOS.accepted;
    completeScan(v);
    stopScanSound();
    const tt = setTimeout(() => {
      if (onComplete) onComplete(v, did);
      setStage(STAGES.RESULT);
    }, 600);
    _scanTimers.push(tt);
  }, elapsed);
  _scanTimers.push(ct);
}
function cancelScan() {
  _scanTimers.forEach((t) => {
    clearTimeout(t);
    clearInterval(t);
  });
  _scanTimers = [];
  stopScanSound();
}
function typeText(el, text, delay = 0, speed = 18) {
  el.textContent = "";
  let i = 0;
  return new Promise((res) => {
    setTimeout(() => {
      const iv = setInterval(() => {
        el.textContent = text.slice(0, ++i);
        if (i >= text.length) {
          clearInterval(iv);
          res();
        }
      }, speed);
    }, delay);
  });
}
function animateCounter(el, target, dur = 1200) {
  const st = Date.now();
  const tick = () => {
    const p = Math.min((Date.now() - st) / dur, 1);
    const e = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
    el.textContent = Math.round(target * e).toLocaleString();
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function startClock() {
  const tick = () => {
    const n = new Date();
    const el = $clock();
    if (el)
      el.textContent = [n.getHours(), n.getMinutes(), n.getSeconds()]
        .map((v) => String(v).padStart(2, "0"))
        .join(":");
  };
  tick();
  setInterval(tick, 1000);
}

function activateStage(id) {
  document.querySelectorAll(".stage").forEach((el) => {
    if (el.id === `stage-${id}`) return;
    el.classList.remove("stage--active");
    el.classList.add("stage--exit");
    setTimeout(() => el.classList.remove("stage--exit"), 400);
  });
  const t = document.getElementById(`stage-${id}`);
  if (t) t.classList.add("stage--active");
}
function clearAll() {
  [
    "welcome",
    "place",
    "sealed",
    "identify",
    "scanning",
    "result",
    "tag",
    "placefinal",
  ].forEach((id) => {
    const el = document.getElementById(`stage-${id}`);
    if (el) {
      el.innerHTML = "";
      el.classList.remove("stage--active", "stage--exit");
    }
  });
}

function buildStepper(activeIdx) {
  const steps = [
    "Place Item",
    "Sealed",
    "Type",
    "Scan",
    "Result",
    "Print Tag",
    "Place in Fridge",
  ];
  let h = '<div class="stepper">';
  steps.forEach((label, i) => {
    const num = String(i + 1).padStart(2, "0");
    const cls =
      i < activeIdx
        ? "stepper-pill--done"
        : i === activeIdx
          ? "stepper-pill--active"
          : "";
    // Only steps already completed (done) are navigable via click
    const role = i < activeIdx ? "button" : "presentation";
    const tab = i < activeIdx ? 'tabindex="0"' : "";
    h += `<div class="stepper-pill ${cls}" data-step="${i}" role="${role}" ${tab}>${num} ${label}</div>`;
  });
  h += "</div>";
  return h;
}

// Map stepper index -> stage id + build function
const STEPPER_TARGETS = [
  { stage: "place", build: () => buildPlace() },
  { stage: "sealed", build: () => buildSealed() },
  { stage: "identify", build: () => buildIdentify() },
  { stage: "scanning", build: () => buildScanning() },
  // index 4 (Result) and 5 (Print Tag) require verdict + did; handled separately
];

function wireStepperNav(container) {
  if (!container) return;
  container.querySelectorAll(".stepper-pill--done").forEach((pill) => {
    pill.addEventListener("click", () => {
      const idx = parseInt(pill.dataset.step, 10);
      navigateToStep(idx);
    });
    pill.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        const idx = parseInt(pill.dataset.step, 10);
        navigateToStep(idx);
      }
    });
  });
}

function navigateToStep(idx) {
  // Cancel any running scan timers before jumping
  if (typeof cancelScan === "function") cancelScan();
  const target = STEPPER_TARGETS[idx];
  if (!target) return;
  const stageKey = target.stage.toUpperCase();
  if (STAGES[stageKey]) setStage(STAGES[stageKey]);
  activateStage(target.stage);
  target.build();

function buildWelcome() {
  const s = document.getElementById("stage-welcome");
  if (!s) return;
  s.innerHTML = "";
  s.style.cssText =
    "display:grid;grid-template-columns:520px 1fr;grid-template-rows:auto 1fr;";

  const left = document.createElement("div");
  left.style.cssText =
    "border-right:1px solid var(--col-rule);display:flex;flex-direction:column;justify-content:center;padding:56px 48px;";
  // Full-width stepper bar
  const stepperBar = document.createElement("div");
  stepperBar.style.cssText =
    "grid-column:1/-1;padding:14px 24px;border-bottom:1px solid rgba(0,0,0,0.08);background:#FAFAFA;";
  stepperBar.innerHTML = buildStepper(-1);
  s.appendChild(stepperBar);
  wireStepperNav(stepperBar);

  left.innerHTML = `
    <div class="t-caps stagger-children" style="margin-bottom:var(--sp-12);">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><div class="live-dot"></div><span style="color:var(--col-accept);">Open 24 / 7</span></div>
      <div>Community Donation Point</div>
    </div>
    <div style="font-family:'DM Sans','Outfit',sans-serif;font-size:48px;font-weight:300;letter-spacing:-0.03em;line-height:1.1;color:var(--col-text-primary);margin-bottom:24px;">Check Food<br>Freshness Before<br>Donating</div>
    <div class="t-body" style="font-size:15px;line-height:1.8;margin-bottom:32px;max-width:340px;">Every donation is scanned to ensure safety.<br>Help us keep the community healthy.</div>
  `;

  const cta = document.createElement("button");
  cta.className = "btn btn--cta";
  cta.textContent = "Tap to Begin";
  cta.addEventListener("click", () => {
    setStage(STAGES.PLACE);
    activateStage("place");
    buildPlace();
    resetIdleTimer(() => {
      resetToIdle();
      activateStage("welcome");
    });
  });
  left.appendChild(cta);

  const right = document.createElement("div");
  right.style.cssText =
    "display:flex;align-items:flex-end;justify-content:center;overflow:hidden;background:#FFFFFF;padding:0;";
  right.innerHTML = `<img src="${FOOD_IMG}" style="width:100%;max-height:100%;object-fit:contain;object-position:bottom center;display:block;">`;
  s.appendChild(left);
  s.appendChild(right);
}

// ===================== STAGE 2: PLACE =====================
function buildPlace() {
  const s = document.getElementById("stage-place");
  if (!s) return;
  s.innerHTML = "";
  s.style.cssText =
    "display:grid;grid-template-columns:520px 1fr;grid-template-rows:auto 1fr;";
  const stepBar = document.createElement("div");
  stepBar.style.cssText =
    "grid-column:1/-1;padding:14px 24px;border-bottom:1px solid rgba(0,0,0,0.08);background:#FAFAFA;";
  stepBar.innerHTML = buildStepper(0);
  s.appendChild(stepBar);
  wireStepperNav(stepBar);
  const left = document.createElement("div");
  left.style.cssText =
    "border-right:1px solid var(--col-rule);display:flex;flex-direction:column;justify-content:center;padding:56px 48px;";
  left.innerHTML = `<div class="t-caps" style="margin-bottom:var(--sp-8);">Step 01 — Place Item</div><div style="font-family:'DM Sans','Outfit',sans-serif;font-size:44px;font-weight:300;letter-spacing:-0.03em;line-height:1.1;color:var(--col-text-primary);margin-bottom:24px;">Place your<br>donation here.</div><div class="t-body" style="font-size:15px;line-height:1.8;margin-bottom:48px;max-width:320px;">Position the item on the scanning tray.<br>The sensors will activate once detected.</div>`;
  const cta = document.createElement("button");
  cta.className = "btn btn--cta";
  cta.textContent = "Item Placed — Continue";
  cta.addEventListener("click", () => {
    setStage(STAGES.SEALED);
    activateStage("sealed");
    buildSealed();
  });
  left.appendChild(cta);
  const right = document.createElement("div");
  right.style.cssText =
    "display:flex;align-items:center;justify-content:center;overflow:hidden;background:#FFFFFF;padding:40px;perspective:800px;";
  right.innerHTML = `
    <div class="fridge-wrapper scanner-wrap">
      <div class="fridge-body scanner-box">
        <div class="fridge-inside"></div>
        <div class="fridge-door">
          <div class="fridge-handle"></div>
        </div>
      </div>
      <div class="fridge-base scanner-base--dark"></div>
    </div>`;
  s.appendChild(left);
  s.appendChild(right);
}

// ===================== STAGE 3: SEALED =====================
function buildSealed() {
  const s = document.getElementById("stage-sealed");
  if (!s) return;
  s.innerHTML = "";
  s.style.cssText =
    "display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;";

  const sBar2 = document.createElement("div");
  sBar2.style.cssText =
    "grid-column:1/-1;padding:14px 24px;border-bottom:1px solid rgba(0,0,0,0.08);background:#FAFAFA;";
  sBar2.innerHTML = buildStepper(1);
  s.appendChild(sBar2);
  wireStepperNav(sBar2);

  const center = document.createElement("div");
  center.style.cssText =
    "padding:48px 40px;display:flex;flex-direction:column;justify-content:center;gap:24px;border-right:1px solid var(--col-rule);";
  center.innerHTML = `<div class="t-caps" style="margin-bottom:8px;">Step 02 — Packaging Check</div><div style="font-family:'DM Sans','Outfit',sans-serif;font-size:38px;font-weight:300;letter-spacing:-0.02em;line-height:1.1;color:var(--col-text-primary);">Is the food sealed?</div><div class="t-body" style="font-size:14px;line-height:1.8;max-width:380px;">For safety, all donated food must be properly sealed or in its original packaging. Unsealed or open food cannot be scanned.</div>`;
  const br = document.createElement("div");
  br.style.cssText = "display:flex;gap:12px;margin-top:8px;";

  const yb = document.createElement("button");
  yb.className = "btn btn--primary btn--accept";
  yb.style.cssText = "flex:1;padding:20px;font-size:17px;border-radius:8px;";
  yb.textContent = "Yes — Sealed";
  yb.addEventListener("click", () => {
    setStage(STAGES.IDENTIFY);
    activateStage("identify");
    buildIdentify();
  });

  const nb = document.createElement("button");
  nb.className = "btn btn--primary btn--decline";
  nb.style.cssText = "flex:1;padding:20px;font-size:17px;border-radius:8px;";
  nb.textContent = "No — Unsealed";
  nb.addEventListener("click", () => {
    center.innerHTML = `<div style="border:1px solid var(--col-warning-border);background:var(--col-warning-dim);padding:32px;border-radius:8px;animation:warning-pulse 2s ease-in-out infinite;"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;"><div style="width:8px;height:8px;border-radius:50%;background:var(--col-warning);animation:pulse-dot 1s ease-in-out infinite;"></div><div class="t-caps" style="color:var(--col-warning);">CANNOT PROCEED</div></div><div style="font-family:'DM Sans',sans-serif;font-size:28px;font-weight:400;color:var(--col-text-primary);margin-bottom:16px;">Unsealed food cannot be scanned.</div><div class="t-body" style="font-size:14px;line-height:1.8;">For food safety, we can only accept sealed items. Please seal the food and try again, or use the composting bin.</div></div>`;
    const bb = document.createElement("button");
    bb.className = "btn btn--ghost";
    bb.style.cssText = "margin-top:16px;padding:14px 28px;";
    bb.textContent = "Start Over";
    bb.addEventListener("click", () => {
      resetToIdle();
      clearAll();
      buildWelcome();
      activateStage("welcome");
      if ($did()) $did().textContent = "";
    });
    center.appendChild(bb);
  });

  br.appendChild(yb);
  br.appendChild(nb);
  center.appendChild(br);

  const right = document.createElement("div");
  right.style.cssText =
    "padding:48px 40px;display:flex;flex-direction:column;gap:20px;justify-content:center;";
  right.innerHTML = `<div class="t-caps" style="margin-bottom:8px;">Why sealed?</div><div style="display:flex;flex-direction:column;gap:10px;">${[
    ["Contamination", "Open food can carry bacteria from handling."],
    ["Cross-contact", "Allergens can transfer between items."],
    ["Shelf life", "Sealed packaging preserves freshness."],
    ["Regulations", "Food safety guidelines require sealed packaging."],
  ]
    .map(
      ([t, d]) =>
        `<div style="padding:12px 0;border-bottom:1px solid var(--col-rule);"><div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;color:var(--col-accent-lime-dark);margin-bottom:4px;">${t}</div><div style="font-size:12px;color:var(--col-text-tertiary);line-height:1.6;">${d}</div></div>`,
    )
    .join("")}</div>`;

  s.appendChild(center);
  s.appendChild(right);
}

// ===================== STAGE 4: IDENTIFY =====================
function buildIdentify() {
  const s = document.getElementById("stage-identify");
  if (!s) return;
  s.innerHTML = "";
  s.style.cssText =
    "display:grid;grid-template-columns:260px 1fr;grid-template-rows:auto 1fr;";
  const sBar3 = document.createElement("div");
  sBar3.style.cssText =
    "grid-column:1/-1;padding:14px 24px;border-bottom:1px solid rgba(0,0,0,0.08);background:#FAFAFA;";
  sBar3.innerHTML = buildStepper(2);
  s.appendChild(sBar3);
  wireStepperNav(sBar3);

  const left = document.createElement("div");
  left.style.cssText =
    "border-right:1px solid var(--col-rule);padding:48px 32px;display:flex;flex-direction:column;";
  left.innerHTML = `<div class="t-caps" style="margin-bottom:24px;">Step 03 — Identify</div><div style="font-family:'DM Sans','Outfit',sans-serif;font-size:28px;font-weight:400;letter-spacing:-0.02em;line-height:1.15;margin-bottom:24px;color:var(--col-text-primary);">What type of<br>food is it?</div><div class="t-body" style="font-size:13px;line-height:1.8;">Select the category to calibrate sensors.</div>`;

  const center = document.createElement("div");
  center.style.cssText =
    "padding:48px 40px;display:flex;flex-direction:column;justify-content:center;gap:12px;";

  const grid = document.createElement("div");
  grid.style.cssText = "display:grid;grid-template-columns:1fr 1fr;gap:12px;";
  FOOD_TYPES.forEach((type) => {
    const btn = document.createElement("button");
    btn.className = "btn btn--tile";
    btn.style.cssText =
      "padding:24px 24px;display:flex;flex-direction:column;align-items:flex-start;gap:10px;text-align:left;";
    btn.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:6px;width:100%;">
        <div class="t-caps">${type.code}</div>
        <div style="font-family:'DM Sans','Outfit',sans-serif;font-size:20px;font-weight:500;color:var(--col-text-primary);">${type.label}</div>
        <div style="font-size:12px;color:var(--col-text-tertiary);">${type.description}</div>
      </div>
    `;
    btn.addEventListener("click", () => {
      selectFoodType(type);
      if (meshRenderer) meshRenderer.setFoodType(type.id);
      grid
        .querySelectorAll(".btn--tile")
        .forEach((b) => b.classList.remove("selected"));
      btn.classList.add("selected");

      if (type.warning) {
        // Prepared / Cooked — block donation
        setTimeout(() => {
          center.innerHTML = `<div style="border:1px solid var(--col-warning-border);background:var(--col-warning-dim);padding:32px;border-radius:8px;animation:warning-pulse 2s ease-in-out infinite;"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;"><div style="width:8px;height:8px;border-radius:50%;background:var(--col-warning);animation:pulse-dot 1s ease-in-out infinite;"></div><div class="t-caps" style="color:var(--col-warning);">CANNOT PROCEED</div></div><div style="font-family:'DM Sans',sans-serif;font-size:28px;font-weight:400;color:var(--col-text-primary);margin-bottom:16px;">Prepared food cannot be donated.</div><div class="t-body" style="font-size:14px;line-height:1.8;">For food safety, we cannot accept cooked or prepared meals. These items require strict temperature and timing controls we cannot verify here. Please use the composting bin instead.</div></div>`;
          const bb = document.createElement("button");
          bb.className = "btn btn--ghost";
          bb.style.cssText =
            "margin-top:16px;padding:14px 28px;align-self:flex-start;";
          bb.textContent = "Start Over";
          bb.addEventListener("click", () => {
            resetToIdle();
            clearAll();
            buildWelcome();
            activateStage("welcome");
            if ($did()) $did().textContent = "";
          });
          center.appendChild(bb);
        }, 600);
      } else {
        if (type.id === "produce") {
          selectScenario("declined");
        } else {
          // packaged, bakery — explicitly set to accepted so previous "declined" state doesn't leak
          selectScenario("accepted");
        }
        setTimeout(() => {
          setStage(STAGES.SCANNING);
          activateStage("scanning");
          buildScanning();
        }, 500);
      }
    });
    grid.appendChild(btn);
  });
  center.appendChild(grid);

  s.appendChild(left);
  s.appendChild(center);
}

// ===================== STAGE 5: SCANNING (exact same) =====================
function buildScanning() {
  const s = document.getElementById("stage-scanning");
  if (!s) return;
  s.innerHTML = "";
  s.style.cssText = "display:grid;grid-template-columns:220px 1fr 220px;";

  const left = document.createElement("div");
  left.style.cssText =
    "border-right:1px solid var(--col-rule);padding:40px 24px;display:flex;flex-direction:column;";
  const sl = document.createElement("div");
  sl.className = "t-caps";
  sl.style.marginBottom = "var(--sp-6)";
  sl.textContent = "Analysis sequence";
  left.appendChild(sl);
  SCAN_STEPS.forEach((step, i) => {
    const el = document.createElement("div");
    el.className = "scan-step pending";
    el.id = `scan-step-${i}`;
    el.innerHTML = `<div class="scan-step__status"></div><div style="flex:1;"><div style="font-size:12px;color:var(--col-text-secondary);line-height:1.4;">${step.label}</div><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--col-text-tertiary);margin-top:2px;">${step.sublabel}</div></div>`;
    left.appendChild(el);
  });

  const center = document.createElement("div");
  center.style.cssText =
    "position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#FFFFFF;";
  const sm = document.createElement("canvas");
  sm.width = 480;
  sm.height = 480;
  sm.style.cssText = "width:380px;height:380px;position:relative;z-index:2;";
  const scl = document.createElement("div");
  scl.className = "scan-line";
  const fr = document.createElement("div");
  fr.className = "scan-chamber__frame";
  fr.innerHTML = '<div class="corner-br"></div><div class="corner-bl"></div>';
  fr.style.cssText =
    "position:absolute;inset:20px;z-index:3;pointer-events:none;";
  const arc = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  arc.setAttribute("width", "140");
  arc.setAttribute("height", "140");
  arc.style.cssText = "position:absolute;bottom:24px;right:24px;z-index:4;";
  arc.innerHTML = `<circle cx="70" cy="70" r="50" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1"/><circle id="scan-arc" cx="70" cy="70" r="50" fill="none" stroke="var(--col-accent-lime-dark)" stroke-width="1" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="314" transform="rotate(-90 70 70)" style="transition:stroke-dashoffset 0.3s linear;"/><text id="scan-pct" x="70" y="73" text-anchor="middle" font-family="DM Mono" font-size="14" fill="var(--col-text-secondary)" font-weight="400">0%</text>`;
  center.appendChild(sm);
  center.appendChild(scl);
  center.appendChild(fr);
  center.appendChild(arc);
  void scl.offsetWidth;
  scl.classList.add("scan-line--active");

  const right = document.createElement("div");
  right.style.cssText =
    "border-left:1px solid var(--col-rule);padding:40px 24px;display:flex;flex-direction:column;";
  right.innerHTML =
    '<div class="t-caps" style="margin-bottom:20px;">Live readings</div><div id="live-readings" style="display:flex;flex-direction:column;gap:2px;font-family:\'DM Mono\',monospace;font-size:10px;color:var(--col-text-tertiary);line-height:2.2;"></div>';

  s.appendChild(left);
  s.appendChild(center);
  s.appendChild(right);

  if (meshRenderer) meshRenderer.stop();
  const st = getState();
  meshRenderer = new MeshRenderer(sm, st.selectedFoodType?.id || "produce");
  meshRenderer.setStage("scanning");

  const liveEl = document.getElementById("live-readings");
  let li = null;
  if (liveEl) {
    let ri = 0;
    li = setInterval(() => {
      const r = (Math.random() * 10).toFixed(2);
      const k = ["VISUAL", "UV-A", "THERMAL", "OCR"][ri % 4];
      const ls = liveEl.querySelectorAll("div");
      if (ls.length >= 12 && ls[ls.length - 1]) ls[ls.length - 1].remove();
      const l = document.createElement("div");
      l.textContent = `${k}: ${r}`;
      liveEl.prepend(l);
      ri++;
    }, 400);
  }

  const ae = document.getElementById("scan-arc"),
    pe = document.getElementById("scan-pct");
  const ai = setInterval(() => {
    const st2 = getState();
    const pct = st2.scanProgress;
    const off = 314 * (1 - pct / 100);
    if (ae) ae.setAttribute("stroke-dashoffset", off.toFixed(1));
    if (pe) pe.textContent = Math.round(pct) + "%";
  }, 80);

  startScanSequence(
    (i) => {
      if (i > 0) {
        const p = document.getElementById(`scan-step-${i - 1}`);
        if (p) {
          p.classList.remove("active");
          p.classList.add("complete");
        }
      }
      const c = document.getElementById(`scan-step-${i}`);
      if (c) {
        c.classList.remove("pending");
        c.classList.add("active");
      }
    },
    (v, did) => {
      clearInterval(ai);
      clearInterval(li);
      if ($did()) $did().textContent = `ID: ${did}`;
      buildResult(v, did);
    },
  );
}

// ===================== STAGE 6: RESULT =====================

  const sBar4 = document.createElement("div");
  sBar4.style.cssText =
    "grid-column:1/-1;padding:14px 24px;border-bottom:1px solid rgba(0,0,0,0.08);background:#FAFAFA;";
  sBar4.innerHTML = buildStepper(4);
  s.appendChild(sBar4);
  wireStepperNav(sBar4);
  const oc = v.outcome;

  const left = document.createElement("div");
  left.style.cssText =
    "border-right:1px solid var(--col-rule);padding:40px 32px;display:flex;flex-direction:column;";

    mw.innerHTML = `<div style="font-size:14px;color:var(--col-text-secondary);">${v.copy.acknowledge}</div>`;

  if (oc === "decline") {
    const endMsg = document.createElement("div");
    endMsg.style.cssText =
      "margin-top:var(--sp-6);font-size:14px;color:var(--col-text-secondary);line-height:1.8;";
    endMsg.textContent = "You tried, and that matters.";
    left.appendChild(endMsg);

    const anotherBtn = document.createElement("button");
    anotherBtn.className = "btn btn--ghost";
    anotherBtn.style.cssText =
      "margin-top:var(--sp-4);padding:14px 24px;text-align:center;";
    anotherBtn.textContent = "Donate Another Item";
    anotherBtn.addEventListener("click", () => {
      resetToIdle();
      clearAll();
      buildWelcome();
      activateStage("welcome");
      if ($did()) $did().textContent = "";
    });
    left.appendChild(anotherBtn);
  } else {
    const nb = document.createElement("button");
    nb.className = `btn btn--primary btn--${oc}`;
    nb.style.cssText = "margin-top:var(--sp-6);border-radius:8px;";
    nb.textContent = "Print Tag";
    nb.addEventListener("click", () => {
      setStage(STAGES.TAG);
      activateStage("tag");
      buildTag(v, did);
    });
    left.appendChild(nb);
  }

  // Center — receipt-style freshness-check tag (matches reference image)
  const center = document.createElement("div");
  center.style.cssText =
    "position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#FFFFFF;padding:40px;";

  const now = new Date();
  const timeStr =
    String(now.getHours()).padStart(2, "0") +
    ":" +
    String(now.getMinutes()).padStart(2, "0");

  if (oc === "decline") {
    // Show compost bin with food dropping into it
    const binScene = document.createElement("div");
    binScene.style.cssText =
      "position:relative;width:280px;height:360px;display:flex;align-items:flex-end;justify-content:center;";

          <div class="compost-bin__label">COMPOST</div>
          <div class="compost-bin__ridge"></div>
          <div class="compost-bin__ridge" style="top:58%"></div>
        </div>
      </div>
    `;
    center.appendChild(binScene);
  } else {
    const receipt = document.createElement("div");
    receipt.className = "receipt-tag";
    receipt.style.cssText +=
      "width:100%;max-width:420px;animation:ticket-print 0.8s var(--ease-out-expo) 0.2s both;";
    let receiptHTML = "";
    (v.checks || []).forEach((ch, i) => {
      receiptHTML += `<div class="tag-line" style="animation:tag-line-reveal 0.4s ease ${0.4 + i * 0.18}s both;">${ch.label} ${ch.ok ? "✓" : "✗"}</div>`;
    });
    receiptHTML += `<div class="tag-footer">DONATED ${timeStr} · SAFE FOR ${v.shelfDays} DAYS</div>`;
    receipt.innerHTML = receiptHTML;
    center.appendChild(receipt);
  }

  const fr = document.createElement("div");
  fr.className = "scan-chamber__frame";
  fr.innerHTML = '<div class="corner-br"></div><div class="corner-bl"></div>';
  fr.style.cssText =
    "position:absolute;inset:30px;z-index:3;pointer-events:none;";
  center.appendChild(fr);

  // Right — checks (simplified, no bacteria/CO2)
  const right = document.createElement("div");
  right.style.cssText =
    "border-left:1px solid var(--col-rule);padding:40px 24px;display:flex;flex-direction:column;";
  right.innerHTML =
    '<div class="t-caps" style="margin-bottom:var(--sp-5);">Freshness checks</div>';

  v.checks.forEach((ch, i) => {
    const row = document.createElement("div");
    row.style.cssText = `display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--col-rule);opacity:0;animation:tag-line-reveal 0.4s var(--ease-out-expo) ${0.3 + i * 0.15}s forwards;`;
    row.innerHTML = `<div style="width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${ch.ok ? "var(--col-accept-dim)" : "var(--col-decline-dim)"};border:1px solid ${ch.ok ? "var(--col-accept-border)" : "var(--col-decline-border)"};flex-shrink:0;"><span style="font-size:10px;color:${ch.ok ? "var(--col-accept)" : "var(--col-decline)"};">${ch.ok ? "✓" : "✗"}</span></div><div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;color:var(--col-text-secondary);">${ch.label}</div>`;
    right.appendChild(row);
  });

  const iw = document.createElement("div");
  iw.style.cssText =
    "margin-top:auto;padding-top:20px;border-top:1px solid var(--col-rule);";
  iw.innerHTML = `<div class="t-caps" style="margin-bottom:14px;">This month</div><div class="impact-row"><span class="impact-row__num" id="imp-m">0</span><span style="font-size:11px;color:var(--col-text-secondary);">meals</span></div><div class="impact-row"><span class="impact-row__num" id="imp-k">0</span><span style="font-size:11px;color:var(--col-text-secondary);">kg rescued</span></div>`;
  right.appendChild(iw);

  s.appendChild(left);
  s.appendChild(center);
  s.appendChild(right);

  if (meshRenderer) {
    meshRenderer.stop();
    meshRenderer = null;
  }
  setTimeout(() => {
    const m = document.getElementById("imp-m"),
      k = document.getElementById("imp-k");
    if (m) animateCounter(m, IMPACT_DATA.mealsThisMonth);
    if (k) animateCounter(k, IMPACT_DATA.kgRescued);
  }, 600);
  activateStage("result");
}

// ===================== STAGE 8: PLACE IN FRIDGE (FINAL) =====================

  `;

  const btnRow = document.createElement("div");
  btnRow.style.cssText =
    "display:flex;flex-direction:column;gap:12px;width:280px;";
  const doneBtn = document.createElement("button");
  doneBtn.className = "btn btn--cta";
  doneBtn.textContent = "Done";
  const anotherBtn = document.createElement("button");
  anotherBtn.className = "btn btn--ghost";
  anotherBtn.style.cssText = "padding:14px 24px;text-align:center;";
  anotherBtn.textContent = "Donate Another Item";

  doneBtn.addEventListener("click", () => {
    resetToIdle();
    clearAll();
    buildWelcome();
    activateStage("welcome");
    if ($did()) $did().textContent = "";
  });
  anotherBtn.addEventListener("click", () => {
    resetToIdle();
    clearAll();
    buildWelcome();
    activateStage("welcome");
    if ($did()) $did().textContent = "";
  });

  btnRow.appendChild(doneBtn);
  btnRow.appendChild(anotherBtn);
  left.appendChild(btnRow);

  const right = document.createElement("div");
  right.style.cssText =
    "display:flex;align-items:center;justify-content:center;overflow:hidden;background:#FFFFFF;padding:40px;perspective:800px;";
  right.innerHTML = `
    <div class="fridge-wrapper">
      <div class="fridge-body">
        <div class="fridge-inside">
          <div class="fridge-shelf" style="top:25%"></div>
          <div class="fridge-shelf" style="top:50%"></div>
          <div class="fridge-shelf" style="top:75%"></div>
          <div class="fridge-glow"></div>
        </div>
        <div class="fridge-door">
          <div class="fridge-handle"></div>
        </div>
      </div>
      <div class="fridge-base"></div>
    </div>`;
  s.appendChild(left);
  s.appendChild(right);
}

// ============================================================
function init() {
  startClock();
  buildWelcome();
  activateStage("welcome");
}
function scaleKiosk() { /* no-op: responsive mode via CSS */ }
document.addEventListener("DOMContentLoaded", function () {
  scaleKiosk();
  window.addEventListener("resize", scaleKiosk);
  init();
});

// main.js — responsive mode, init handled by ui.js

</script>
</body>
</html>
